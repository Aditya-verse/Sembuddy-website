<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SemBuddy | Your Smart Engineering Companion</title>

  <meta name="description"
    content="Calculate marks, track attendance, and view syllabus with SemBuddy - The ultimate app for engineering students." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            display: ["Poppins", "sans-serif"]
          },
          colors: {
            brand: {
              dark: "#020617",
              card: "#0f172a",
              blue: "#3b82f6",
              teal: "#2dd4bf",
              green: "#4ade80"
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #020617;
      color: #f8fafc;
      overflow-x: hidden;
      font-family: Inter, sans-serif;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 100px;
    }

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #020617;
    }

    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 5px;
    }
  </style>

</head>

<body class="antialiased">

  <div id="root"></div>

  <!-- IMPORTANT FIX -->
  <script type="module" src="/index.tsx"></script>

</body>

</html>
